<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="dashboard">

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="greeting-section">
        <h1 id="greeting">Good morning!</h1>
        <p id="datetime"></p>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
        <img id="themeIcon" src="assets/moon.svg" alt="Toggle theme" width="20" height="20" draggable="false" decoding="async">
      </button>
    </header>

    <!-- Main Grid -->
    <main class="grid">

      <!-- Focus Timer -->
      <section class="card timer-card">
        <h2 class="card-title">
          <img src="./assets/timer.svg" alt="" width="18" height="18" draggable="false" decoding="async">
          <span>Focus Timer</span>
        </h2>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-settings">
          <label for="pomodoroInput">Minutes:</label>
          <input type="number" id="pomodoroInput" min="1" max="99" value="25" />
          <button class="btn btn-secondary" id="applyTimer">Apply</button>
        </div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="startTimer">Start</button>
          <button class="btn btn-secondary" id="stopTimer">Stop</button>
          <button class="btn btn-danger" id="resetTimer">Reset</button>
        </div>
      </section>

      <!-- To-Do List -->
      <section class="card todo-card">
        <h2 class="card-title">
          <img src="./assets/list.svg" alt="" width="18" height="18" draggable="false" decoding="async">
          <span>To-Do List</span>
        </h2>
        <div class="todo-toolbar">
          <div class="todo-input-row">
            <input type="text" id="taskInput" placeholder="Add a new task..." />
            <button class="btn btn-primary" id="addTask">Add</button>
            <button class="btn btn-danger" id="clearAll">Clear All</button>
          </div>
          <div class="sort-row">
            <label for="sortSelect">Sort:</label>
            <select id="sortSelect">
              <option value="default">Default</option>
              <option value="az">A → Z</option>
              <option value="za">Z → A</option>
              <option value="done">Done last</option>
            </select>
          </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="emptyState">
          <img src="./assets/todo.svg" alt="No tasks" width="80" height="80" draggable="false" decoding="async" loading="lazy">
          <p>No tasks yet.</p>
          <span>Add a task to get started!</span>
        </div>

        <ul class="task-list" id="taskList"></ul>
      </section>

      <!-- Quick Links -->
      <section class="card links-card">
        <h2 class="card-title">
          <img src="./assets/link.svg" alt="" width="18" height="18" draggable="false" decoding="async">
          <span>Quick Links</span>
        </h2>
        <div class="link-input-row">
          <input type="text" id="linkName" placeholder="Name" />
          <input type="url" id="linkUrl" placeholder="URL" />
          <button class="btn btn-primary" id="addLink">Add</button>
        </div>
        <div class="links-grid" id="linksGrid"></div>
      </section>

    </main>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-content">
      <p>Are you sure you want to clear all tasks?</p>
      <div class="modal-actions">
        <button id="confirmYes" class="btn btn-danger">Yes</button>
        <button id="confirmNo" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer"></div>

  <script src="js/app.js" defer></script>
</body>
</html>
